<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your Acuron IT Services client account" />
  <meta name="robots" content="noindex" />
  <title>Sign Up — Acuron IT Services</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
</head>
<body>

<div style="position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 70% 30%, rgba(124,58,237,0.08), transparent 60%),
             radial-gradient(ellipse at 20% 70%, rgba(0,229,255,0.06), transparent 60%),
             linear-gradient(rgba(124,58,237,0.02) 1px, transparent 1px) 0 0 / 60px 60px,
             linear-gradient(90deg, rgba(124,58,237,0.02) 1px, transparent 1px) 0 0 / 60px 60px,
             var(--blue-deep);" aria-hidden="true"></div>

<div class="auth-page" style="position:relative;z-index:1;">
  <div class="auth-card">
    <a href="index.html" class="auth-logo" aria-label="Back to Acuron IT Services Home">
      <div class="logo-icon" aria-hidden="true">A</div>
      Acuron <span>IT</span>
    </a>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Access the Acuron client portal and resources</p>

    <div id="auth-error" class="auth-error" role="alert" aria-live="polite"></div>
    <div id="auth-success" class="auth-error" style="background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:#6EE7B7;" role="status" aria-live="polite"></div>

    <!-- Google Signup -->
    <button class="btn-google" id="google-signup" aria-label="Sign up with Google">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or create with email</span></div>

    <form id="signup-form" novalidate>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group" style="margin-bottom:0;">
          <label for="first-name" class="form-label">First name</label>
          <input type="text" id="first-name" class="form-input" placeholder="John" required autocomplete="given-name" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="last-name" class="form-label">Last name</label>
          <input type="text" id="last-name" class="form-input" placeholder="Smith" required autocomplete="family-name" />
        </div>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label for="company" class="form-label">Company name</label>
        <input type="text" id="company" class="form-input" placeholder="Acme Corporation" autocomplete="organization" />
      </div>
      <div class="form-group">
        <label for="email" class="form-label">Work email address</label>
        <input type="email" id="email" class="form-input" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
        <div id="pw-strength" style="height:3px;margin-top:6px;border-radius:2px;background:rgba(255,255,255,0.05);overflow:hidden;">
          <div id="pw-strength-bar" style="height:100%;width:0%;border-radius:2px;transition:all 0.3s ease;"></div>
        </div>
        <div id="pw-strength-label" style="font-size:0.72rem;color:var(--gray-600);margin-top:4px;"></div>
      </div>
      <div class="form-group">
        <label for="confirm-password" class="form-label">Confirm password</label>
        <input type="password" id="confirm-password" class="form-input" placeholder="Repeat your password" required autocomplete="new-password" />
      </div>

      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:20px;">
        <input type="checkbox" id="terms" name="terms" required style="accent-color:var(--cyan);width:16px;height:16px;margin-top:2px;flex-shrink:0;" />
        <label for="terms" style="font-size:0.82rem;color:var(--gray-400);cursor:pointer;line-height:1.5;">
          I agree to Acuron's <a href="termandprivacy.html" style="color:var(--cyan);">Terms of Service</a> and <a href="termandprivacy.html" style="color:var(--cyan);">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="signup-submit">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
    <div class="auth-footer" style="margin-top:8px;">
      <a href="index.html" style="color:var(--gray-400);font-size:0.8rem;">← Back to main site</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  firebase.auth().onAuthStateChanged(user => {
    if (user) window.location.href = 'index.html';
  });

  const errorEl = document.getElementById('auth-error');
  const successEl = document.getElementById('auth-success');

  function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); successEl.classList.remove('show'); }
  function showSuccess(msg) { successEl.textContent = msg; successEl.classList.add('show'); errorEl.classList.remove('show'); }
  function hideAll() { errorEl.classList.remove('show'); successEl.classList.remove('show'); }

  // Password strength meter
  document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    const bar = document.getElementById('pw-strength-bar');
    const label = document.getElementById('pw-strength-label');
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;
    const configs = [
      { w: '0%', bg: 'transparent', t: '' },
      { w: '25%', bg: '#EF4444', t: 'Weak' },
      { w: '50%', bg: '#F59E0B', t: 'Fair' },
      { w: '75%', bg: '#3B82F6', t: 'Good' },
      { w: '100%', bg: '#10B981', t: 'Strong' },
    ];
    const c = configs[strength];
    bar.style.width = c.w; bar.style.background = c.bg;
    label.textContent = c.t; label.style.color = c.bg;
  });

  // Sign up
  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAll();
    const firstName = document.getElementById('first-name').value.trim();
    const lastName = document.getElementById('last-name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const terms = document.getElementById('terms').checked;

    if (!firstName || !lastName) { showError('Please enter your full name.'); return; }
    if (!email) { showError('Please enter a valid email address.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (password !== confirm) { showError('Passwords do not match. Please try again.'); return; }
    if (!terms) { showError('You must agree to the Terms of Service to continue.'); return; }

    const btn = document.getElementById('signup-submit');
    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName: `${firstName} ${lastName}` });
      showSuccess('Account created! Redirecting to your dashboard...');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (err) {
      btn.textContent = 'Create Account';
      btn.disabled = false;
      const msg = {
        'auth/email-already-in-use': 'An account with this email already exists. Try signing in instead.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/weak-password': 'Please choose a stronger password (at least 8 characters).'
      }[err.code] || 'Account creation failed. Please try again.';
      showError(msg);
    }
    const db = firebase.firestore();

await db.collection("users").doc(cred.user.uid).set({
email: email,
role: "user"
});
  });

  // Google signup
  document.getElementById('google-signup').addEventListener('click', async () => {
    hideAll();
    try {
      await firebase.auth().signInWithPopup(googleProvider);
      window.location.href = 'index.html';
    } catch (err) {
      showError('Google sign-up failed. Please try again.');
    }
  });
 
</script>
</body>
</html>

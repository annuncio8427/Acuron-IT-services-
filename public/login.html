<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to Acuron IT Services Client Portal" />
  <meta name="robots" content="noindex" />
  <title>Login — Acuron IT Services</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
</head>

<body>

  <div style="position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 40%, rgba(0,229,255,0.06), transparent 60%),
             radial-gradient(ellipse at 80% 60%, rgba(124,58,237,0.08), transparent 60%),
             linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px) 0 0 / 60px 60px,
             linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px) 0 0 / 60px 60px,
             var(--blue-deep);" aria-hidden="true"></div>

  <div class="auth-page" style="position:relative;z-index:1;">
    <div class="auth-card">
      <a href="index.html" class="auth-logo" aria-label="Back to Acuron IT Services Home">
        <div class="logo-icon" aria-hidden="true">A</div>
        Acuron <span>IT</span>
      </a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your Acuron client portal</p>

      <div id="auth-error" class="auth-error" role="alert" aria-live="polite"></div>

      <button class="btn-google" id="google-login" aria-label="Continue with Google">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path
            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
            fill="#4285F4" />
          <path
            d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
            fill="#34A853" />
          <path
            d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"
            fill="#FBBC05" />
          <path
            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"
            fill="#EA4335" />
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or sign in with email</span></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@company.com" required
            aria-required="true" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password" class="form-label" style="display:flex;justify-content:space-between;">
            Password
            <a href="#" style="color:var(--cyan);font-size:0.8rem;font-weight:500;" id="forgot-pw">Forgot password?</a>
          </label>
          <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required
            aria-required="true" autocomplete="current-password" minlength="6" />
        </div>

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
          <input type="checkbox" id="remember" name="remember"
            style="accent-color:var(--cyan);width:16px;height:16px;" />
          <label for="remember" style="font-size:0.82rem;color:var(--gray-400);cursor:pointer;">Keep me signed
            in</label>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-submit">
          Sign In to Portal
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">signup</a>
      </div>
      <div class="auth-footer" style="margin-top:8px;">
        <a href="index.html" style="color:var(--gray-400);font-size:0.8rem;">← Back to main site</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script>
    // const auth = firebase.auth();
    // const db = firebase.firestore();

    // 1. CENTRALIZED ROUTER
    // This listens for ANY login success (Google or Email) and handles the redirect.
    auth.onAuthStateChanged(async (user) => {
      if (!user) return; // If no user is logged in, do nothing (stay on login page).

      try {
        const doc = await db.collection("users").doc(user.uid).get();
        
        if (doc.exists && doc.data().role === "admin") {
          window.location.href = "dashboard.html";
        } else {
          window.location.href = "index.html";
        }
      } catch (error) {
        console.error("Error fetching user role:", error);
        document.getElementById("auth-error").innerText = "Failed to verify account role.";
      }
    });

    // 2. EMAIL & PASSWORD LOGIN
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        // We only need to trigger the sign-in. 
        // The onAuthStateChanged listener above will automatically catch the success and redirect!
        await auth.signInWithEmailAndPassword(email, password);
      } catch (error) {
        document.getElementById("auth-error").innerText = error.message;
      }
    });

    // 3. GOOGLE LOGIN
    document.getElementById("google-login").addEventListener("click", async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        // Same here! Just trigger the popup.
        await auth.signInWithPopup(provider);
      } catch (error) {
        document.getElementById("auth-error").innerText = error.message;
      }
    });

    // 4. PASSWORD RESET
    document.getElementById("forgot-pw").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();

      if (!email) {
        alert("Please enter your email address first.");
        return;
      }
      try {
        await auth.sendPasswordResetEmail(email);
        alert("Password reset email sent! Check your inbox.");
      } catch (error) {
        document.getElementById("auth-error").innerText = error.message;
      }
    });
  </script>

</body>

</html><!-- v2 -->
